<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Learning</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .topic-btn {
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    .topic-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    }

    /* Main Content */
    .content {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 30px;
      width: 80%;
      max-width: 800px;
      text-align: center;
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      transition: 0.4s;
    }

    .card h1 {
      margin-bottom: 20px;
    }

    .card p {
      font-size: 18px;
      line-height: 1.6;
    }

    /* Fancy Glow Effect */
    .card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 40px rgba(0,150,255,0.6);
    }

    /* Top Navigation */
    .topbar {
      position: fixed;
      top: 0;
      left: 260px;
      right: 0;
      height: 60px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .topbar h3 {
      font-weight: 500;
    }

    /* Responsive */
    @media(max-width: 800px) {
      .sidebar {
        width: 180px;
      }
      .topbar {
        left: 180px;
      }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>📘 Themen</h2>
    <button class="topic-btn" onclick="loadTopic('algebra')">Algebra</button>
    <button class="topic-btn" onclick="loadTopic('geometry')">Geometrie</button>
    <button class="topic-btn" onclick="loadTopic('analysis')">Analysis</button>
    <button class="topic-btn" onclick="loadTopic('probability')">Wahrscheinlichkeit</button>
  </div>

  <div class="topbar">
    <h3>Mathe Lernplattform</h3>
  </div>

  <div class="content">
    <div class="card" id="contentBox">
      <h1>Willkommen 👋</h1>
      <p>Wähle links ein Thema aus, um zu starten. Vielen Dank, dass du dich für diese Website entschieden hast</p>
    </div>
  </div>

  <script>
    function loadTopic(topic) {
      const box = document.getElementById('contentBox');

      const data = {
        algebra: {
          title: 'Algebra',
          text: 'Algebra beschäftigt sich mit Variablen, Gleichungen und Strukturen.'
        },
        geometry: {
          title: 'Geometrie',
          text: 'Geometrie untersucht Formen, Winkel und Räume.'
        },
        analysis: {
          title: 'Analysis',
          text: 'Analysis behandelt Funktionen, Ableitungen und Integrale.'
        },
        probability: {
          title: 'Wahrscheinlichkeit',
          text: 'Hier lernst du Zufall, Statistik und Wahrscheinlichkeiten.'
        }
      };

      box.innerHTML = `
        <h1>${data[topic].title}</h1>
        <p>${data[topic].text}</p>
      `;
    }
  </script>

</body>
</html>
